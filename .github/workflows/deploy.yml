name: Deploy to EC2

on:
  push:
    branches:
      - main   # ya jo branch use kar raha hai

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 32.236.47.70
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            cd /var/www/express-app/E-com
            git pull origin main
            npm install
            pm2 restart all